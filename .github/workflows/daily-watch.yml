name: Daegu Grant Watch

on:
  schedule:
    # 전국 308개 사이트 매일 09:00 KST 1회 수집 (메일 발송 12:00 전)
    - cron: "0 9 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daegu-grant-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run watcher
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m daegu_grants.run \
            --min-amount 20000000 \
            --region "대구" \
            --keywords "AI,인공지능,미디어아트,미디어파사드,영상,콘텐츠,실감콘텐츠,XR,VR,AR,전시,디자인,공공디자인,공공미디어,디지털콘텐츠,정책자금,융자,대출,보증,특례보증,이자지원,경영안정자금,신용보증,기술보증,제조,도소매,화훼,꽃,로봇"

      - name: Commit report and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data reports drafts site || true
          git diff --cached --quiet || git commit -m "Daily grant watch report"
          git push
