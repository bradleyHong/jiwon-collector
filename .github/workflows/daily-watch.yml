name: Daegu Grant Watch

on:
  # GitHub 자체 schedule은 제거했다. 이유 2가지:
  #  1) 무료 Actions 분 절약 — schedule은 신선도 무관하게 매번 풀 실행해 한도를 빠르게 태웠다.
  #  2) GitHub schedule은 4~5시간씩 지연되는 고질병이 있었다.
  # 대신 Vercel cron이 /api/cron/run-collector를 호출하고, 그 라우트가 '데이터가 오래됐을 때만'
  # 이 워크플로를 workflow_dispatch로 트리거한다(중복·불필요 실행 자동 차단).
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daegu-grant-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run watcher
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_REFINE_MODEL: ${{ vars.ANTHROPIC_REFINE_MODEL }}
          OPENAI_REFINE_MODEL: ${{ vars.OPENAI_REFINE_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m daegu_grants.run \
            --min-amount 20000000 \
            --region "대구" \
            --keywords "AI,인공지능,미디어아트,미디어파사드,영상,콘텐츠,실감콘텐츠,XR,VR,AR,전시,디자인,공공디자인,공공미디어,디지털콘텐츠,정책자금,융자,대출,보증,특례보증,이자지원,경영안정자금,신용보증,기술보증,제조,도소매,화훼,꽃,로봇"

      # 데이터는 Supabase로 직접 적재되므로 git commit 불필요.
      # reports/drafts를 매번 commit하면 동시 실행 시 merge conflict로 워크플로가 실패함 → 제거.
      - name: Done
        run: echo "수집 완료. 데이터는 Supabase에 적재됨."
